name: GitHub Profile Scanner

on:
  push:
    branches:
      - main  # Change this to the branch name you are working with

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Send start message to Discord
      run: |
        if [ -z "${{ secrets.DISCORD_WEBHOOK }}" ]; then
          echo "Discord webhook URL not set. Please set the DISCORD_WEBHOOK secret in your repository settings."
          exit 1
        fi
        curl -H "Content-Type: application/json" \
             -X POST \
             -d "{\"content\": \"**Scan Started**: The GitHub profile scan process has started.\"}" \
             ${{ secrets.DISCORD_WEBHOOK }}

    - name: Install GitGuardian CLI
      run: |
        pip install ggshield

    - name: Scan GitHub Profiles
      run: |
        while read username; do
          repos=$(curl -s https://api.github.com/users/$username/repos | jq -r '.[].clone_url')
          if [ -n "$repos" ]; then
            echo "$repos" > ${username}_repos.txt
          else
            echo "No repositories found for $username" >> error.log
            curl -H "Content-Type: application/json" \
                 -X POST \
                 -d "{\"content\": \"> **Error**: No repositories found for ```github.com/$username```\"}" \
                 ${{ secrets.DISCORD_WEBHOOK }}
          fi
          sleep 1  # Add delay to prevent rate limiting
        done < github_username.txt

    - name: Clone and Scan Repositories
      run: |
        while read username; do
          mkdir -p repos/$username
          cd repos/$username
          if [ -f ../../${username}_repos.txt ]; then
            while read repo; do
              git clone $repo || { echo "Failed to clone $repo" >> ../../error.log; continue; }
            done < ../../${username}_repos.txt
            ggshield secret scan .
            scan_status=$?
            cd ../../
            if [ $scan_status -eq 0 ]; then
              curl -H "Content-Type: application/json" \
                   -X POST \
                   -d "{\"content\": \"> **Scan Completed Successfully**\n> ```github.com/$username Scan Passed and Action Succeeded```\"}" \
                   ${{ secrets.DISCORD_WEBHOOK }}
            else
              curl -H "Content-Type: application/json" \
                   -X POST \
                   -d "{\"content\": \"> **Scan Completed with Issues**\n> ```github.com/$username Scan Failed and Action Failed```\"}" \
                   ${{ secrets.DISCORD_WEBHOOK }}
            fi
          else
            curl -H "Content-Type: application/json" \
                 -X POST \
                 -d "{\"content\": \"> **Error**: No repositories to scan for ```github.com/$username```\"}" \
                 ${{ secrets.DISCORD_WEBHOOK }}
          fi
          sleep 1  # Add delay to prevent rate limiting
        done < github_username.txt
