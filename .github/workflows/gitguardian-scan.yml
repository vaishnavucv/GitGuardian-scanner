name: GitGuardian Profile Scan

on: 
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  scanning:
    name: Scan GitHub Profiles for Secrets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # fetch all history so multiple commits can be scanned

      - name: Send Start Status to Discord
        run: |
          curl -H "Content-Type: application/json" -X POST -d "{\"content\": \"**Scan Started**: The GitHub profile scan process has started.\"}" ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Install Required Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Fetch Repositories from List
        run: |
          while read url; do
            username=$(echo $url | awk -F/ '{print $4}')
            repos=$(curl -s https://api.github.com/users/$username/repos | jq -r '.[].clone_url')
            echo "$repos" > ${username}_repos.txt
          done < github_profiles.txt

      - name: Clone Repositories and Scan
        run: |
          while read url; do
            username=$(echo $url | awk -F/ '{print $4}')
            mkdir -p repos/$username
            cd repos/$username
            while read repo; do
              git clone $repo
            done < ../../${username}_repos.txt
            ggshield secret scan .
            scan_status=$?
            cd ../../
            if [ $scan_status -eq 0 ]; then
              curl -H "Content-Type: application/json" -X POST -d "{\"content\": \"> **Scan Completed Successfully**\n> ```github.com/$username Scan Passed and Action Succeeded```\"}" ${{ secrets.DISCORD_WEBHOOK_URL }}
            else
              curl -H "Content-Type: application/json" -X POST -d "{\"content\": \"> **Scan Completed with Issues**\n> ```github.com/$username Scan Failed and Action Failed```\"}" ${{ secrets.DISCORD_WEBHOOK_URL }}
            fi
          done < github_profiles.txt

      - name: Cleanup
        run: |
          rm -rf repos *.txt
          curl -H "Content-Type: application/json" -X POST -d "{\"content\": \"**Cleanup Completed**: The temporary files and directories have been removed.\"}" ${{ secrets.DISCORD_WEBHOOK_URL }}
